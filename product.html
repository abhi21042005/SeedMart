<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details - Seed & Fertilizer</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div id="navbar-root"></div>

  <main class="main-content">
    <div class="product-details-page page-wrapper">
      <div class="container">
        <a href="marketplace.html" class="back-link">← Back to Marketplace</a>

        <div id="product-container" class="pd-grid" style="display: none;">
          <!-- Image Section -->
          <div class="pd-image-section">
            <div class="pd-image-wrapper">
              <img id="pd-image" src="" alt="Product">
              <span id="pd-badge" class="badge"></span>
            </div>
          </div>

          <!-- Info Section -->
          <div class="pd-info">
            <h1 id="pd-name"></h1>

            <div class="pd-meta">
              <div class="stars" id="pd-stars"></div>
              <span id="pd-rating-text"></span>
              <span><span id="pd-seller"></span></span>
            </div>

            <p class="pd-price" id="pd-price"></p>
            <p class="pd-description" id="pd-description"></p>

            <div class="pd-stock" id="pd-stock-container"></div>

            <div class="pd-actions" id="pd-actions-container" style="display: none;">
              <div class="qty-selector">
                <button id="qty-minus">-</button>
                <span id="qty-value">1</span>
                <button id="qty-plus">+</button>
              </div>
              <button class="btn btn-primary btn-lg" id="add-to-cart-btn">
                Add to Cart
              </button>
              <button class="btn btn-secondary" id="wishlist-toggle">
                ♥
              </button>
            </div>
          </div>
        </div>

        <div id="loading-state" style="padding: 4rem; text-align: center;">Loading product details...</div>
        <div id="error-state" style="display: none; padding: 4rem; text-align: center; color: var(--color-error);"></div>

        <!-- Reviews Section -->
        <div class="pd-reviews" id="reviews-section" style="display: none;">
          <h2>Customer Reviews</h2>
          
          <div id="review-form-container" style="display: none;">
            <form id="review-form" class="review-form" style="background: var(--color-bg-alt); padding: 1.5rem; border-radius: var(--radius-lg); margin-bottom: 1.5rem;">
              <h4 style="margin-bottom: 1rem; font-family: var(--font-body); font-size: 1rem;">Write a Review</h4>
              
              <div style="display: flex; gap: 0.25rem; margin-bottom: 1rem;" id="star-selector">
                <!-- Stars injected here -->
              </div>
              
              <textarea id="review-comment" placeholder="Share your experience with this product..." rows="3" style="margin-bottom: 1rem; resize: vertical; width: 100%;" maxlength="500"></textarea>
              
              <button type="submit" class="btn btn-primary btn-sm" id="submit-review">Submit Review</button>
            </form>
          </div>

          <div id="reviews-list" style="display: flex; flex-direction: column; gap: 1rem;">
            <!-- Reviews injected here -->
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-root"></div>
  <div id="chatbot-root"></div>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/components.js"></script>
  <script src="js/chatbot.js"></script>
  <script src="js/pages/product.js"></script>
</body>
</html>
