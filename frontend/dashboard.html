<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Seed & Fertilizer</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div id="navbar-root"></div>

  <main class="main-content">
    <div class="dashboard-page page-wrapper">
      <div class="container">
        <div class="dashboard-header">
          <h1 id="dashboard-title">Dashboard</h1>
          <p id="dashboard-subtitle">Welcome back</p>
        </div>

        <div class="dashboard-tabs">
          <button class="tab-btn active" id="tab-products">📦 Products</button>
          <button class="tab-btn" id="tab-orders">🛍️ Orders</button>
        </div>

        <!-- Products Section -->
        <div id="section-products" class="dashboard-content">
          <div class="content-header">
            <h2>My Products</h2>
            <button class="btn btn-primary" id="btn-add-product">➕ Add Product</button>
          </div>

          <form id="product-form" class="product-form card" style="display: none;">
            <h3 id="form-title">New Product</h3>
            <div class="form-row">
              <div class="form-group">
                <label>Name</label>
                <input type="text" id="p-name" required>
              </div>
              <div class="form-group">
                <label>Category</label>
                <select id="p-category" required>
                  <option value="seeds">Seeds</option>
                  <option value="fertilizers">Fertilizers</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Price (₹)</label>
                <input type="number" id="p-price" required min="0">
              </div>
              <div class="form-group">
                <label>Stock</label>
                <input type="number" id="p-stock" required min="0">
              </div>
            </div>
            <div class="form-group">
              <label>Description</label>
              <textarea id="p-desc" required rows="3"></textarea>
            </div>
            <div class="form-group">
              <label>Image</label>
              <input type="file" id="p-image" accept="image/*">
            </div>
            <div class="form-actions">
              <button type="button" class="btn btn-secondary" id="btn-cancel-form">Cancel</button>
              <button type="submit" class="btn btn-primary" id="btn-submit-form">Save Product</button>
            </div>
          </form>

          <div class="table-responsive">
            <table class="dashboard-table">
              <thead>
                <tr>
                  <th>Product</th>
                  <th>Category</th>
                  <th>Price</th>
                  <th>Stock</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="products-tbody">
                <tr><td colspan="5" class="text-center">Loading products...</td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Orders Section -->
        <div id="section-orders" class="dashboard-content" style="display: none;">
          <div class="content-header">
            <h2 id="orders-title">Orders</h2>
          </div>
          
          <div class="table-responsive">
            <table class="dashboard-table">
              <thead>
                <tr>
                  <th>Order ID</th>
                  <th>Customer</th>
                  <th>Date</th>
                  <th>Total</th>
                  <th>Status</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="orders-tbody">
                <tr><td colspan="6" class="text-center">Loading orders...</td></tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </div>
  </main>

  <div id="footer-root"></div>
  <div id="chatbot-root"></div>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/components.js"></script>
  <script src="js/chatbot.js"></script>
  <script src="js/pages/dashboard.js"></script>
</body>
</html>
