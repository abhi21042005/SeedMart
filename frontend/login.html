<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Seed & Fertilizer Marketplace</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div id="navbar-root"></div>

  <main class="main-content">
    <div class="auth-page page-wrapper">
      <div class="auth-container">
        <div class="auth-card animate-fade-in-up">
          <div class="auth-header">
            <div class="auth-logo">🌱</div>
            <h1>Welcome Back</h1>
            <p>Sign in to your SeedMart account</p>
          </div>

          <form id="login-form" class="auth-form">
            <div class="form-group">
              <label for="login-email">Email Address</label>
              <input type="email" id="login-email" placeholder="farmer@example.com" required>
            </div>

            <div class="form-group">
              <label for="login-password">Password</label>
              <input type="password" id="login-password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-lg auth-submit" id="login-submit">
              Sign In
            </button>
          </form>

          <p class="auth-switch">
            Don't have an account? <a href="register.html">Create one for free</a>
          </p>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-root"></div>
  <div id="chatbot-root"></div>

  <!-- Scripts -->
  <script src="js/api.js?v=1.1"></script>
  <script src="js/auth.js?v=1.1"></script>
  <script src="js/cart.js?v=1.1"></script>
  <script src="js/components.js?v=1.1"></script>
  <script src="js/chatbot.js?v=1.1"></script>
  <script src="js/pages/login.js?v=1.1"></script>
</body>
</html>
