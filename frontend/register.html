<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Seed & Fertilizer Marketplace</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div id="navbar-root"></div>

  <main class="main-content">
    <div class="auth-page page-wrapper">
      <div class="auth-container">
        <div class="auth-card animate-fade-in-up">
          <div class="auth-header">
            <div class="auth-logo">🌱</div>
            <h1>Join SeedMart</h1>
            <p>Create your free account</p>
          </div>
          
          <form id="register-form" class="auth-form">
            <div class="form-group">
              <label for="reg-name">Full Name</label>
              <input type="text" id="reg-name" placeholder="Your full name" required>
            </div>
            
            <div class="form-group">
              <label for="reg-email">Email Address</label>
              <input type="email" id="reg-email" placeholder="farmer@example.com" required>
            </div>
            
            <div class="form-group">
              <label>I am a</label>
              <div class="role-selector" id="role-selector">
                <button type="button" class="role-option role-active" data-role="farmer">🧑‍🌾 Farmer</button>
                <button type="button" class="role-option" data-role="seller">🏪 Seller</button>
              </div>
            </div>
            
            <div class="form-group">
              <label for="reg-pass">Password</label>
              <input type="password" id="reg-pass" placeholder="At least 6 characters" required minlength="6">
            </div>
            
            <div class="form-group">
              <label for="reg-confirm">Confirm Password</label>
              <input type="password" id="reg-confirm" placeholder="Confirm password" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-lg auth-submit" id="register-submit">
              Create Account
            </button>
          </form>
          
          <p class="auth-switch">Already have an account? <a href="login.html">Sign in</a></p>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-root"></div>
  <div id="chatbot-root"></div>

  <!-- Scripts -->
  <script src="js/api.js?v=1.1"></script>
  <script src="js/auth.js?v=1.1"></script>
  <script src="js/cart.js?v=1.1"></script>
  <script src="js/components.js?v=1.1"></script>
  <script src="js/chatbot.js?v=1.1"></script>
  <script src="js/pages/register.js?v=1.1"></script>
</body>
</html>
